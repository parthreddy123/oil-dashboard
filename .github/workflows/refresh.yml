name: Refresh Scenario Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # Full history for branch operations

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from database.db_manager import init_db; init_db()
          from processing.data_processor import full_refresh
          results = full_refresh()
          for k, v in results.items():
              print(f'  {k}: {v}')
          "
          python export_html.py
          echo "Report generated"

      - name: Commit updated DB to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/oil_dashboard.db scenario_report.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh: update data and report [skip ci]"
          git pull --rebase origin main || true
          git push origin main || echo "Push to main failed (non-fatal)"

      - name: Deploy to gh-pages
        run: |
          cp scenario_report.html /tmp/index.html
          git checkout --orphan gh-pages-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          rm -rf * .github .gitignore 2>/dev/null || true
          cp /tmp/index.html index.html
          git add index.html
          git commit -m "Auto-deploy scenario report"
          git push origin HEAD:gh-pages --force
