name: Refresh Scenario Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        continue-on-error: true
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SMTP_SERVER: smtp.gmail.com
          EMAIL_SMTP_PORT: '587'
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: parth.reddy@live.com
        run: |
          python -c "
          from database.db_manager import init_db; init_db()
          from processing.data_processor import full_refresh
          results = full_refresh()
          for k, v in results.items():
              print(f'  {k}: {v}')
          "

      - name: Generate HTML report
        run: python export_html.py

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp scenario_report.html deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
